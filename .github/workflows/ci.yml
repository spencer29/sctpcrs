# Main CI Workflow
# Runs on every push and pull request:
#   1. Lint & type-check
#   2. Production build
#   3. Triggers SBOM generation (see sbom.yml)

name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  # ── Lint & Type-check ────────────────────────────────────────────────────────
  lint:
    name: Lint & Type-check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run ESLint
        run: npm run lint

      - name: TypeScript type-check
        run: npm run type-check

  # ── Build ────────────────────────────────────────────────────────────────────
  build:
    name: Production Build
    runs-on: ubuntu-latest
    needs: lint

    env:
      # Provide dummy values so Next.js build doesn't fail on missing env vars.
      # Real secrets are injected at deploy time via your hosting provider.
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
      NEXT_PUBLIC_SITE_URL: https://placeholder.example.com

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build-${{ github.sha }}
          path: .next/
          retention-days: 7
          if-no-files-found: error

  # ── SBOM (runs in parallel with build after lint passes) ─────────────────────
  sbom:
    name: SBOM Generation
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Generate CycloneDX SBOM
        run: |
          npx --yes @cyclonedx/cyclonedx-npm \
            --output-format JSON \
            --output-file sbom-cyclonedx.json \
            --package-lock-only \
            --flatten-components

      - name: Print component count
        run: |
          node -e "
            const fs = require('fs');
            const bom = JSON.parse(fs.readFileSync('sbom-cyclonedx.json', 'utf8'));
            console.log('Components in SBOM:', (bom.components||[]).length);
          "

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.sha }}
          path: sbom-cyclonedx.json
          retention-days: 90
